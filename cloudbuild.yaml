steps:
  # Build backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/calai-backend:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/calai-backend:latest"
      - ./backend
    id: build-backend

  # Build frontend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/calai-frontend:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/calai-frontend:latest"
      - ./frontend
    id: build-frontend

  # Push backend
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/calai-backend:$COMMIT_SHA"]
    waitFor: [build-backend]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/calai-backend:latest"]
    waitFor: [build-backend]

  # Push frontend
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/calai-frontend:$COMMIT_SHA"]
    waitFor: [build-frontend]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/calai-frontend:latest"]
    waitFor: [build-frontend]

  # Deploy backend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - calai-backend
      - --image=gcr.io/$PROJECT_ID/calai-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --set-secrets=SECRET_KEY=calai-secret-key:latest,ENCRYPTION_KEY=calai-encryption-key:latest,DATABASE_URL=calai-database-url:latest,GOOGLE_CLIENT_ID=calai-google-client-id:latest,GOOGLE_CLIENT_SECRET=calai-google-client-secret:latest,SLACK_CLIENT_ID=calai-slack-client-id:latest,SLACK_CLIENT_SECRET=calai-slack-client-secret:latest,SLACK_SIGNING_SECRET=calai-slack-signing-secret:latest,SLACK_BOT_TOKEN=calai-slack-bot-token:latest,ANTHROPIC_API_KEY=calai-anthropic-api-key:latest
      - --set-env-vars=ENVIRONMENT=production,FRONTEND_URL=https://calai-frontend-URL
    waitFor: [build-backend]

  # Deploy frontend to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - calai-frontend
      - --image=gcr.io/$PROJECT_ID/calai-frontend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=5
      - --memory=256Mi
    waitFor: [build-frontend]

images:
  - "gcr.io/$PROJECT_ID/calai-backend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/calai-backend:latest"
  - "gcr.io/$PROJECT_ID/calai-frontend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/calai-frontend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
